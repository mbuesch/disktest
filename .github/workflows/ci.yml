name: Cargo Build & Test

on:
  push:
  pull_request:

env: 
  CARGO_TERM_COLOR: always

jobs:
  build_and_test:
    name: Build and test
    strategy:
      matrix:
        toolchain:
          - name: msrv
            version: 1.85
          - name: stable
            version: stable
          - name: nightly
            version: nightly
        os:
          - name: linux
            version: ubuntu-latest
          - name: windows
            version: windows-latest
    runs-on: ${{ matrix.os.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Cache Rust
        uses: actions/cache@v5
        with:
          path: ~/.rustup
          key: rustup-${{ runner.os.version }}-${{ matrix.toolchain.version }}
      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: ~/.cargo
          key: cargo-${{ runner.os.version }}-${{ matrix.toolchain.version }}

      - run: rustup update ${{ matrix.toolchain.version }}
      - run: rustup default ${{ matrix.toolchain.version }}
      - if: matrix.toolchain.name == 'stable'
        run: rustup component add clippy

      - run: cargo build

      - if: matrix.toolchain.name == 'stable'
        run: cargo clippy -- --deny warnings
      - if: matrix.toolchain.name == 'stable'
        run: cargo clippy --tests -- --deny warnings

      - run: cargo test

