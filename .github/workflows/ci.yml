name: Build, Test, and Release

on:
  workflow_dispatch:
  pull_request:
  push:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build_and_test:
    name: Build and test
    strategy:
      matrix:
        toolchain:
          - name: msrv
            version: 1.85
          - name: stable
            version: 1.94
        os:
          - name: linux
            version: ubuntu-latest
          - name: windows
            version: windows-latest
    runs-on: ${{ matrix.os.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Cache Rust
        uses: actions/cache@v5
        with:
          path: ~/.rustup
          key: rustup-${{ runner.os.version }}-${{ matrix.toolchain.version }}
      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: ~/.cargo
          key: cargo-${{ runner.os.version }}-${{ matrix.toolchain.version }}

      - run: rustup update ${{ matrix.toolchain.version }}
      - run: rustup default ${{ matrix.toolchain.version }}
      - if: matrix.toolchain.name == 'stable'
        run: rustup component add clippy

      - run: cargo build

      - if: matrix.toolchain.name == 'stable'
        run: cargo clippy -- --deny warnings
      - if: matrix.toolchain.name == 'stable'
        run: cargo clippy --tests -- --deny warnings

      - run: cargo test

  release:
    name: Build Release Binaries and Upload Artifacts
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            use_cross: true
            ext: ""
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            use_cross: true
            ext: ""
          - os: ubuntu-latest
            target: armv7-unknown-linux-gnueabihf
            use_cross: true
            ext: ""
#         - os: macos-latest
#           target: aarch64-apple-darwin
#           use_cross: false
#           ext: ""
#         - os: macos-latest
#           target: x86_64-apple-darwin
#           use_cross: false
#           ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            use_cross: false
            ext: ".exe"
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross

      - name: Build release binary with cross
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build release binary with cargo
        if: ${{ !matrix.use_cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload build as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: disktest-${{ matrix.target }}${{ matrix.ext }}
          path: target/${{ matrix.target }}/release/disktest${{ matrix.ext }}
          if-no-files-found: error

      - name: Rename artifact
        shell: bash
        run: mv target/${{ matrix.target }}/release/disktest${{ matrix.ext }} disktest-${{ matrix.target }}${{ matrix.ext }}

      - name: Attach artifacts to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: disktest-${{ matrix.target }}${{ matrix.ext }}
          token: ${{ secrets.GITHUB_TOKEN }}

